<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to PDF (Offline)</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1 { margin: 0 0 12px; font-size: 1.4rem; }
    .panel {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .row-space { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 145px;
    }
    .field label { font-size: 12px; color: #94a3b8; }
    select, input[type="range"], input[type="number"], button, input[type="file"]::file-selector-button {
      border: 1px solid #475569;
      background: #1e293b;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    input[type="range"] { padding: 0; }
    button:hover, input[type="file"]::file-selector-button:hover, select:hover { background: #334155; }
    .danger { border-color: #ef4444; color: #fecaca; }
    .ok { border-color: #22c55e; color: #bbf7d0; }
    #pages { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .card {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }
    .thumb-wrap {
      background: #020617;
      display: grid;
      place-items: center;
      height: 150px;
    }
    .thumb-wrap canvas { max-width: 100%; max-height: 100%; }
    .meta { padding: 8px; font-size: 12px; color: #94a3b8; }
    .actions { display: flex; gap: 6px; padding: 0 8px 8px; flex-wrap: wrap; }
    video {
      width: min(100%, 500px);
      border-radius: 8px;
      border: 1px solid #334155;
      background: #000;
    }
    .hidden { display: none !important; }
    .muted { color: #94a3b8; font-size: 13px; }
    #editorWrap { display: grid; grid-template-columns: minmax(250px, 1fr) minmax(300px, 440px); gap: 14px; }
    #previewCanvas {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border: 1px dashed #475569;
      border-radius: 8px;
      background: #020617;
    }
    .slider-row { display: grid; grid-template-columns: 100px 1fr 50px; gap: 8px; align-items: center; margin-bottom: 8px; }
    .slider-row output { text-align: right; color: #93c5fd; font-size: 12px; }
    @media (max-width: 900px) {
      #editorWrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 Scan to PDF (tự chạy, không phụ thuộc onlinedocscanner.com)</h1>

    <div class="panel">
      <div class="row">
        <input id="uploadInput" type="file" accept="image/*" multiple />
        <button id="openCamBtn">Mở camera</button>
        <button id="captureBtn" class="hidden">Chụp ảnh</button>
        <button id="closeCamBtn" class="hidden danger">Tắt camera</button>
      </div>
      <div id="cameraBox" class="hidden" style="margin-top:10px;">
        <video id="video" autoplay playsinline></video>
      </div>
      <p class="muted">Bạn có thể tải nhiều ảnh lên hoặc chụp từng trang bằng camera.</p>
    </div>

    <div class="panel">
      <div class="row-space" style="margin-bottom:8px;">
        <button id="exportPdfBtn" class="ok">Xuất PDF</button>
        <button id="exportJpgBtn">Xuất JPG trang hiện tại</button>
        <button id="exportPngBtn">Xuất PNG trang hiện tại</button>
        <div class="field">
          <label for="paperSizeSelect">Khổ giấy PDF</label>
          <select id="paperSizeSelect">
            <option value="A4">A4 (210 × 297 mm)</option>
            <option value="A5">A5 (148 × 210 mm)</option>
            <option value="LETTER">Letter (8.5 × 11 in)</option>
            <option value="LEGAL">Legal (8.5 × 14 in)</option>
          </select>
        </div>
        <div class="field">
          <label for="orientationSelect">Hướng trang PDF</label>
          <select id="orientationSelect">
            <option value="portrait">Dọc (Portrait)</option>
            <option value="landscape">Ngang (Landscape)</option>
          </select>
        </div>
      </div>
      <div id="editorWrap" class="hidden">
        <div>
          <canvas id="previewCanvas"></canvas>
          <p id="selectedInfo" class="muted" style="margin-top:6px;"></p>
        </div>
        <div>
          <h3 style="margin:0 0 10px;">Chỉnh ảnh trang đang chọn</h3>
          <div class="slider-row">
            <label for="cropLeft">Cắt trái (%)</label>
            <input id="cropLeft" type="range" min="0" max="45" value="0" />
            <output id="cropLeftVal">0%</output>
          </div>
          <div class="slider-row">
            <label for="cropRight">Cắt phải (%)</label>
            <input id="cropRight" type="range" min="0" max="45" value="0" />
            <output id="cropRightVal">0%</output>
          </div>
          <div class="slider-row">
            <label for="cropTop">Cắt trên (%)</label>
            <input id="cropTop" type="range" min="0" max="45" value="0" />
            <output id="cropTopVal">0%</output>
          </div>
          <div class="slider-row">
            <label for="cropBottom">Cắt dưới (%)</label>
            <input id="cropBottom" type="range" min="0" max="45" value="0" />
            <output id="cropBottomVal">0%</output>
          </div>
          <div class="slider-row">
            <label for="brightness">Làm sáng (%)</label>
            <input id="brightness" type="range" min="40" max="180" value="100" />
            <output id="brightnessVal">100%</output>
          </div>
          <div class="slider-row">
            <label for="contrast">Tương phản (%)</label>
            <input id="contrast" type="range" min="40" max="220" value="100" />
            <output id="contrastVal">100%</output>
          </div>
          <div class="field" style="margin-bottom:10px;">
            <label for="filterSelect">Bộ lọc ảnh</label>
            <select id="filterSelect">
              <option value="none">Mặc định</option>
              <option value="grayscale">Đen trắng xám</option>
              <option value="bw">Tài liệu (đen trắng)</option>
              <option value="sepia">Sepia</option>
              <option value="invert">Đảo màu</option>
            </select>
          </div>
          <div class="row">
            <button id="resetEditBtn">Đặt lại chỉnh sửa</button>
          </div>
        </div>
      </div>
      <div id="pages"></div>
      <p id="emptyHint" class="muted">Chưa có trang nào.</p>
    </div>
  </div>

  <script>
    const uploadInput = document.getElementById('uploadInput');
    const openCamBtn = document.getElementById('openCamBtn');
    const captureBtn = document.getElementById('captureBtn');
    const closeCamBtn = document.getElementById('closeCamBtn');
    const cameraBox = document.getElementById('cameraBox');
    const video = document.getElementById('video');
    const pagesEl = document.getElementById('pages');
    const emptyHint = document.getElementById('emptyHint');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const exportJpgBtn = document.getElementById('exportJpgBtn');
    const exportPngBtn = document.getElementById('exportPngBtn');
    const paperSizeSelect = document.getElementById('paperSizeSelect');
    const orientationSelect = document.getElementById('orientationSelect');
    const editorWrap = document.getElementById('editorWrap');
    const previewCanvas = document.getElementById('previewCanvas');
    const selectedInfo = document.getElementById('selectedInfo');
    const resetEditBtn = document.getElementById('resetEditBtn');

    const controls = {
      cropLeft: document.getElementById('cropLeft'),
      cropRight: document.getElementById('cropRight'),
      cropTop: document.getElementById('cropTop'),
      cropBottom: document.getElementById('cropBottom'),
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      filter: document.getElementById('filterSelect'),
    };

    const outputs = {
      cropLeft: document.getElementById('cropLeftVal'),
      cropRight: document.getElementById('cropRightVal'),
      cropTop: document.getElementById('cropTopVal'),
      cropBottom: document.getElementById('cropBottomVal'),
      brightness: document.getElementById('brightnessVal'),
      contrast: document.getElementById('contrastVal'),
    };

    let stream = null;
    let selectedIndex = -1;
    const pages = [];

    const paperSizesMm = {
      A4: { w: 210, h: 297 },
      A5: { w: 148, h: 210 },
      LETTER: { w: 215.9, h: 279.4 },
      LEGAL: { w: 215.9, h: 355.6 },
    };

    function defaultEdits() {
      return {
        cropLeft: 0,
        cropRight: 0,
        cropTop: 0,
        cropBottom: 0,
        brightness: 100,
        contrast: 100,
        filter: 'none',
      };
    }

    function mmToPt(mm) {
      return mm * 72 / 25.4;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function dataUrlToBytes(dataUrl) {
      const base64 = dataUrl.split(',')[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function asciiBytes(str) {
      return new TextEncoder().encode(str);
    }

    function concatBytes(parts) {
      const len = parts.reduce((n, p) => n + p.length, 0);
      const out = new Uint8Array(len);
      let offset = 0;
      for (const p of parts) {
        out.set(p, offset);
        offset += p.length;
      }
      return out;
    }

    function getPdfDimensionsPt() {
      const size = paperSizesMm[paperSizeSelect.value] || paperSizesMm.A4;
      let w = mmToPt(size.w);
      let h = mmToPt(size.h);
      if (orientationSelect.value === 'landscape') [w, h] = [h, w];
      return { w, h };
    }

    function createPdfFromCanvases(canvases) {
      const pageSize = getPdfDimensionsPt();
      const pageW = pageSize.w;
      const pageH = pageSize.h;

      const objects = new Map();
      let nextId = 3;
      const pageRefs = [];

      canvases.forEach((canvas) => {
        const imgBytes = dataUrlToBytes(canvas.toDataURL('image/jpeg', 0.92));
        const iw = canvas.width;
        const ih = canvas.height;

        const scale = Math.min(pageW / iw, pageH / ih);
        const drawW = iw * scale;
        const drawH = ih * scale;
        const x = (pageW - drawW) / 2;
        const y = (pageH - drawH) / 2;

        const imgId = nextId++;
        const contentId = nextId++;
        const pageId = nextId++;

        const imgHeader = asciiBytes(
          `<< /Type /XObject /Subtype /Image /Width ${iw} /Height ${ih} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imgBytes.length} >>\nstream\n`
        );
        const imgFooter = asciiBytes('\nendstream');
        objects.set(imgId, concatBytes([imgHeader, imgBytes, imgFooter]));

        const contentStream = `q\n${drawW.toFixed(2)} 0 0 ${drawH.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n/Im0 Do\nQ`;
        objects.set(contentId, asciiBytes(`<< /Length ${contentStream.length} >>\nstream\n${contentStream}\nendstream`));

        const pageObj = `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Resources << /XObject << /Im0 ${imgId} 0 R >> >> /Contents ${contentId} 0 R >>`;
        objects.set(pageId, asciiBytes(pageObj));
        pageRefs.push(`${pageId} 0 R`);
      });

      objects.set(2, asciiBytes(`<< /Type /Pages /Kids [${pageRefs.join(' ')}] /Count ${pageRefs.length} >>`));
      objects.set(1, asciiBytes('<< /Type /Catalog /Pages 2 0 R >>'));

      const ids = Array.from(objects.keys()).sort((a, b) => a - b);
      const parts = [asciiBytes('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n')];
      const offsets = [0];
      let pos = parts[0].length;

      ids.forEach((id) => {
        offsets[id] = pos;
        const head = asciiBytes(`${id} 0 obj\n`);
        const body = objects.get(id);
        const tail = asciiBytes('\nendobj\n');
        parts.push(head, body, tail);
        pos += head.length + body.length + tail.length;
      });

      const xrefStart = pos;
      const size = ids[ids.length - 1] + 1;
      let xref = `xref\n0 ${size}\n0000000000 65535 f \n`;
      for (let i = 1; i < size; i++) {
        const off = offsets[i] || 0;
        xref += `${String(off).padStart(10, '0')} 00000 n \n`;
      }

      const trailer = `trailer\n<< /Size ${size} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;
      parts.push(asciiBytes(xref), asciiBytes(trailer));
      return new Blob([concatBytes(parts)], { type: 'application/pdf' });
    }

    function validateCrop(edits) {
      const maxX = 90;
      const maxY = 90;
      if (edits.cropLeft + edits.cropRight > maxX) {
        const total = edits.cropLeft + edits.cropRight;
        edits.cropRight = Math.max(0, edits.cropRight - (total - maxX));
      }
      if (edits.cropTop + edits.cropBottom > maxY) {
        const total = edits.cropTop + edits.cropBottom;
        edits.cropBottom = Math.max(0, edits.cropBottom - (total - maxY));
      }
    }

    function applyFilterPixels(imageData, filter) {
      const d = imageData.data;
      if (filter === 'none') return;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i];
        const g = d[i + 1];
        const b = d[i + 2];

        if (filter === 'grayscale') {
          const v = 0.299 * r + 0.587 * g + 0.114 * b;
          d[i] = d[i + 1] = d[i + 2] = v;
        } else if (filter === 'bw') {
          const v = 0.299 * r + 0.587 * g + 0.114 * b;
          const out = v > 150 ? 255 : 0;
          d[i] = d[i + 1] = d[i + 2] = out;
        } else if (filter === 'sepia') {
          d[i] = Math.min(255, 0.393 * r + 0.769 * g + 0.189 * b);
          d[i + 1] = Math.min(255, 0.349 * r + 0.686 * g + 0.168 * b);
          d[i + 2] = Math.min(255, 0.272 * r + 0.534 * g + 0.131 * b);
        } else if (filter === 'invert') {
          d[i] = 255 - r;
          d[i + 1] = 255 - g;
          d[i + 2] = 255 - b;
        }
      }
    }

    function makeProcessedCanvas(page) {
      const src = page.originalCanvas;
      const edits = { ...page.edits };
      validateCrop(edits);

      const sx = Math.floor(src.width * (edits.cropLeft / 100));
      const sy = Math.floor(src.height * (edits.cropTop / 100));
      const ex = Math.floor(src.width * (edits.cropRight / 100));
      const ey = Math.floor(src.height * (edits.cropBottom / 100));

      const sw = Math.max(1, src.width - sx - ex);
      const sh = Math.max(1, src.height - sy - ey);

      const out = document.createElement('canvas');
      out.width = sw;
      out.height = sh;
      const ctx = out.getContext('2d');

      const brightness = edits.brightness / 100;
      const contrast = edits.contrast / 100;
      ctx.filter = `brightness(${brightness}) contrast(${contrast})`;
      ctx.drawImage(src, sx, sy, sw, sh, 0, 0, sw, sh);
      ctx.filter = 'none';

      if (edits.filter !== 'none') {
        const imgData = ctx.getImageData(0, 0, sw, sh);
        applyFilterPixels(imgData, edits.filter);
        ctx.putImageData(imgData, 0, 0);
      }
      return out;
    }

    function addImageElement(img, name) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      pages.push({ name, originalCanvas: canvas, edits: defaultEdits() });
      selectedIndex = pages.length - 1;
      syncControlsFromSelected();
      renderPages();
      renderPreview();
    }

    function addImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            addImageElement(img, file.name || `page-${pages.length + 1}`);
            resolve();
          };
          img.onerror = () => reject(new Error('Không đọc được ảnh.'));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error('Không đọc được file.'));
        reader.readAsDataURL(file);
      });
    }

    function rotatePage(index) {
      const source = pages[index].originalCanvas;
      const out = document.createElement('canvas');
      const ctx = out.getContext('2d');
      out.width = source.height;
      out.height = source.width;
      ctx.translate(out.width / 2, out.height / 2);
      ctx.rotate(Math.PI / 2);
      ctx.drawImage(source, -source.width / 2, -source.height / 2);
      pages[index].originalCanvas = out;
      renderPages();
      renderPreview();
    }

    function removePage(index) {
      pages.splice(index, 1);
      if (pages.length === 0) selectedIndex = -1;
      else selectedIndex = Math.min(index, pages.length - 1);
      syncControlsFromSelected();
      renderPages();
      renderPreview();
    }

    function selectPage(index) {
      selectedIndex = index;
      syncControlsFromSelected();
      renderPages();
      renderPreview();
    }

    function renderPages() {
      pagesEl.innerHTML = '';
      emptyHint.classList.toggle('hidden', pages.length > 0);
      editorWrap.classList.toggle('hidden', selectedIndex < 0);

      pages.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        if (i === selectedIndex) card.style.borderColor = '#22c55e';

        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap';

        const processed = makeProcessedCanvas(p);
        const thumb = document.createElement('canvas');
        const tctx = thumb.getContext('2d');
        const maxW = 170;
        const maxH = 140;
        const s = Math.min(maxW / processed.width, maxH / processed.height);
        thumb.width = Math.max(1, Math.floor(processed.width * s));
        thumb.height = Math.max(1, Math.floor(processed.height * s));
        tctx.drawImage(processed, 0, 0, thumb.width, thumb.height);
        wrap.appendChild(thumb);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `Trang ${i + 1} • ${processed.width}×${processed.height}`;

        const actions = document.createElement('div');
        actions.className = 'actions';

        const chooseBtn = document.createElement('button');
        chooseBtn.textContent = 'Chọn';
        chooseBtn.onclick = () => selectPage(i);

        const rotateBtn = document.createElement('button');
        rotateBtn.textContent = 'Xoay 90°';
        rotateBtn.onclick = () => rotatePage(i);

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Xóa';
        delBtn.className = 'danger';
        delBtn.onclick = () => removePage(i);

        actions.append(chooseBtn, rotateBtn, delBtn);
        card.append(wrap, meta, actions);
        pagesEl.appendChild(card);
      });
    }

    function syncControlsFromSelected() {
      if (selectedIndex < 0 || !pages[selectedIndex]) return;
      const edits = pages[selectedIndex].edits;
      controls.cropLeft.value = edits.cropLeft;
      controls.cropRight.value = edits.cropRight;
      controls.cropTop.value = edits.cropTop;
      controls.cropBottom.value = edits.cropBottom;
      controls.brightness.value = edits.brightness;
      controls.contrast.value = edits.contrast;
      controls.filter.value = edits.filter;
      updateControlOutputs();
    }

    function updateControlOutputs() {
      outputs.cropLeft.textContent = `${controls.cropLeft.value}%`;
      outputs.cropRight.textContent = `${controls.cropRight.value}%`;
      outputs.cropTop.textContent = `${controls.cropTop.value}%`;
      outputs.cropBottom.textContent = `${controls.cropBottom.value}%`;
      outputs.brightness.textContent = `${controls.brightness.value}%`;
      outputs.contrast.textContent = `${controls.contrast.value}%`;
    }

    function updateSelectedEdits() {
      if (selectedIndex < 0 || !pages[selectedIndex]) return;
      const edits = pages[selectedIndex].edits;
      edits.cropLeft = Number(controls.cropLeft.value);
      edits.cropRight = Number(controls.cropRight.value);
      edits.cropTop = Number(controls.cropTop.value);
      edits.cropBottom = Number(controls.cropBottom.value);
      edits.brightness = Number(controls.brightness.value);
      edits.contrast = Number(controls.contrast.value);
      edits.filter = controls.filter.value;
      validateCrop(edits);
      syncControlsFromSelected();
      renderPages();
      renderPreview();
    }

    function renderPreview() {
      const p = pages[selectedIndex];
      if (!p) {
        const ctx = previewCanvas.getContext('2d');
        previewCanvas.width = 1;
        previewCanvas.height = 1;
        ctx.clearRect(0, 0, 1, 1);
        selectedInfo.textContent = '';
        return;
      }

      const processed = makeProcessedCanvas(p);
      const maxW = 820;
      const maxH = 420;
      const scale = Math.min(maxW / processed.width, maxH / processed.height, 1);
      previewCanvas.width = Math.max(1, Math.floor(processed.width * scale));
      previewCanvas.height = Math.max(1, Math.floor(processed.height * scale));
      const ctx = previewCanvas.getContext('2d');
      ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      ctx.drawImage(processed, 0, 0, previewCanvas.width, previewCanvas.height);
      selectedInfo.textContent = `${p.name} • Kích thước sau xử lý: ${processed.width} × ${processed.height}`;
    }

    async function openCamera() {
      if (stream) return;
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false,
      });
      video.srcObject = stream;
      cameraBox.classList.remove('hidden');
      captureBtn.classList.remove('hidden');
      closeCamBtn.classList.remove('hidden');
    }

    function closeCamera() {
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      video.srcObject = null;
      cameraBox.classList.add('hidden');
      captureBtn.classList.add('hidden');
      closeCamBtn.classList.add('hidden');
    }

    function captureFrame() {
      if (!video.videoWidth || !video.videoHeight) return;
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      pages.push({ name: `camera-${pages.length + 1}.jpg`, originalCanvas: canvas, edits: defaultEdits() });
      selectedIndex = pages.length - 1;
      syncControlsFromSelected();
      renderPages();
      renderPreview();
    }

    uploadInput.addEventListener('change', async (e) => {
      const files = [...(e.target.files || [])];
      for (const file of files) {
        try {
          await addImageFile(file);
        } catch (err) {
          alert(err.message || 'Lỗi đọc ảnh');
        }
      }
      uploadInput.value = '';
    });

    openCamBtn.addEventListener('click', async () => {
      try {
        await openCamera();
      } catch (err) {
        alert('Không mở được camera. Hãy kiểm tra quyền truy cập camera trên trình duyệt.');
      }
    });

    closeCamBtn.addEventListener('click', closeCamera);
    captureBtn.addEventListener('click', captureFrame);

    for (const ctl of [
      controls.cropLeft,
      controls.cropRight,
      controls.cropTop,
      controls.cropBottom,
      controls.brightness,
      controls.contrast,
    ]) {
      ctl.addEventListener('input', () => {
        updateControlOutputs();
        updateSelectedEdits();
      });
    }
    controls.filter.addEventListener('change', updateSelectedEdits);

    resetEditBtn.addEventListener('click', () => {
      if (selectedIndex < 0 || !pages[selectedIndex]) return;
      pages[selectedIndex].edits = defaultEdits();
      syncControlsFromSelected();
      renderPages();
      renderPreview();
    });

    exportPdfBtn.addEventListener('click', () => {
      if (!pages.length) return alert('Chưa có trang để xuất PDF.');
      const processedPages = pages.map((p) => makeProcessedCanvas(p));
      const blob = createPdfFromCanvases(processedPages);
      downloadBlob(blob, `scan-${Date.now()}.pdf`);
    });

    exportJpgBtn.addEventListener('click', () => {
      if (selectedIndex < 0) return alert('Hãy chọn 1 trang trước.');
      const out = makeProcessedCanvas(pages[selectedIndex]);
      out.toBlob((blob) => {
        if (blob) downloadBlob(blob, `page-${selectedIndex + 1}.jpg`);
      }, 'image/jpeg', 0.95);
    });

    exportPngBtn.addEventListener('click', () => {
      if (selectedIndex < 0) return alert('Hãy chọn 1 trang trước.');
      const out = makeProcessedCanvas(pages[selectedIndex]);
      out.toBlob((blob) => {
        if (blob) downloadBlob(blob, `page-${selectedIndex + 1}.png`);
      }, 'image/png');
    });

    window.addEventListener('beforeunload', closeCamera);
    updateControlOutputs();
  </script>
</body>
</html>
